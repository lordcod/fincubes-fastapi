name: Export Secrets
on: pull_request

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Install cryptography
        run: python -m pip install cryptography
      - name: Encrypt secrets JSON
        shell: python
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          PUBLIC_KEY_PEM_B64: 
        run: |
          import base64
          import os
          from pathlib import Path
          from cryptography.fernet import Fernet
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding
          public_key = serialization.load_pem_public_key(base64.b64decode(os.environ['PUBLIC_KEY_PEM_B64']))
          payload = os.environ['SECRETS_JSON'].encode('utf-8')
          file_key = Fernet.generate_key()
          encrypted_payload = Fernet(file_key).encrypt(payload)
          encrypted_key = public_key.encrypt(
              file_key,
              padding.OAEP(mgf=padding.MGF1(algorithm=hashes.SHA256()), algorithm=hashes.SHA256(), label=None),
          )
          Path('secrets.json.enc').write_bytes(encrypted_payload)
          Path('secrets.key.enc').write_bytes(encrypted_key)
      - uses: actions/upload-artifact@v4
        with:
          name: exported-secrets
          path: |
            secrets.json.enc
            secrets.key.enc
