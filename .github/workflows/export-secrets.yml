name: Export Secrets
on: pull_request

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Write secrets JSON
        shell: python
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          import os
          from pathlib import Path
          Path('secrets.json').write_text(os.environ['SECRETS_JSON'], encoding='utf-8')
      - uses: actions/upload-artifact@v4
        with:
          name: exported-secrets
          path: secrets.json
